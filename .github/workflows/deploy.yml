# Triggered: 2026-02-02
name: Build and Deploy to cPanel

on:
  push:
    branches:
      - main        # אם תעבוד על ברנצ' אחר, תשנה כאן

# ביטול אוטומטי של ריצות ישנות כשיש deploy חדש
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build      # Vite => dist

      - name: Prepare FTP target
        run: |
          SERVER="${{ secrets.FTP_SERVER }}"
          SERVER="${SERVER#ftp://}"
          SERVER="${SERVER#ftps://}"
          SERVER="${SERVER%%/*}"

          if getent hosts "$SERVER" >/dev/null 2>&1; then
            echo "FTP_SERVER_TARGET=$SERVER" >> "$GITHUB_ENV"
          else
            # Public cPanel IP for elwejha.co.il. This bypasses intermittent GitHub DNS failures (EAI_AGAIN).
            echo "FTP_SERVER_TARGET=91.204.209.55" >> "$GITHUB_ENV"
          fi

      - name: Deploy via FTP to cPanel (with retry)
        uses: Wandalen/wretry.action@v3
        with:
          action: SamKirkland/FTP-Deploy-Action@v4.3.6
          attempt_limit: 5
          attempt_delay: 30000
          with: |
            server: ${{ env.FTP_SERVER_TARGET }}
            username: ${{ secrets.FTP_USERNAME }}
            password: ${{ secrets.FTP_PASSWORD }}
            port: 21
            protocol: ftp
            local-dir: dist/
            server-dir: /
            dangerous-clean-slate: true
